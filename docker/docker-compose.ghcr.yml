# =============================================================================
# Racona Core — Docker Compose konfiguráció GitHub Container Registry image-dzsel
# =============================================================================
# Ez a konfiguráció a GitHub Container Registry-ből publikált image-et használja,
# így nem kell helyben buildelni.
#
# Használat:
#   1. Másold a .env.example fájlt .env-ként és töltsd ki
#   2. docker compose -f docker/docker-compose.ghcr.yml up -d
#
# Az image automatikusan frissül minden push esetén a main branch-re.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL adatbázis
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:18-alpine
    container_name: racona-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-racona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-racona123}
      POSTGRES_DB: ${POSTGRES_DB:-racona}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - racona-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-racona} -d ${POSTGRES_DB:-racona}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Adatbázis inicializálás (migráció + seed) — egyszeri futás
  # ---------------------------------------------------------------------------
  db-init:
    image: ghcr.io/racona/racona-core:latest
    container_name: racona-db-init
    command: >
      sh -c 'bun --filter @racona/database db:init ${RESET:+-- --reset}'
    env_file:
      - ../.env
    environment:
      - RESET=${RESET:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-racona}:${POSTGRES_PASSWORD:-racona123}@postgres:5432/${POSTGRES_DB:-racona}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - racona-network
    restart: 'no'

  # ---------------------------------------------------------------------------
  # Racona webalkalmazás
  # ---------------------------------------------------------------------------
  app:
    image: ghcr.io/racona/racona-core:latest
    container_name: racona-app
    ports:
      - '${ELYOS_PORT:-3000}:3000'
    env_file:
      - ../.env
    environment:
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - racona-network
    volumes:
      - ../apps/web/uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  racona-network:
    driver: bridge
