name: Publish SDK

on:
  push:
    tags:
      - 'sdk-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: packages/sdk
          sparse-checkout-cone-mode: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/sdk
        run: bun install --ignore-workspace

      - name: Build
        working-directory: packages/sdk
        run: bun run prepublishOnly

      - name: Publish to npm
        working-directory: packages/sdk
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @elyos-dev/sdk version 2>/dev/null || echo "none")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --access public --provenance
          else
            echo "Version $CURRENT already published on npm, skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to JSR
        working-directory: packages/sdk
        run: npx jsr publish --allow-dirty --allow-slow-types

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
