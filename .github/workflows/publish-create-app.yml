name: Publish create-app

on:
  push:
    tags:
      - 'create-app-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: packages/create-elyos-app
          sparse-checkout-cone-mode: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: packages/create-elyos-app
        run: bun install

      - name: Build
        working-directory: packages/create-elyos-app
        run: bun run prepublishOnly

      - name: Publish to npm
        working-directory: packages/create-elyos-app
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @elyos-dev/create-app version 2>/dev/null || echo "none")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            npm publish --access public
          else
            echo "Version $CURRENT already published on npm, skipping."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
