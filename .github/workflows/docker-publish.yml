# =============================================================================
# Racona Core — Docker Image publikálás GitHub Container Registry-be
# =============================================================================
# Trigger:
#   - Tag push (v*.*.*)
#   - Manuális indítás (workflow_dispatch)
#
# Output:
#   - ghcr.io/[owner]/racona-core:latest (mindig az utolsó release)
#   - ghcr.io/[owner]/racona-core:0.1.0 (verzió tag)
#   - ghcr.io/[owner]/racona-core:0.1 (major.minor tag)
#   - ghcr.io/[owner]/racona-core:0 (major tag)
#
# Multi-platform build: linux/amd64, linux/arm64
# =============================================================================

name: Docker Image Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/racona-core

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ---------------------------------------------------------------------------
      # 1. Checkout kód
      # ---------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------------
      # 2. Docker Buildx setup (multi-platform build-hez)
      # ---------------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------------------------------------------------------
      # 3. Bejelentkezés GitHub Container Registry-be
      # ---------------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------------------
      # 4. Docker metadata generálás (tag-ek, label-ek)
      # ---------------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # ---------------------------------------------------------------------------
      # 5. Build és push multi-platform image
      # ---------------------------------------------------------------------------
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------------------
      # 6. Image digest kiírása (ellenőrzéshez)
      # ---------------------------------------------------------------------------
      - name: Output image digest
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
